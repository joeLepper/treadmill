# Tempo configuration for Treadmill observability stack.
#
# Uses S3 for trace blob storage (${TEMPO_S3_BUCKET} expanded at startup
# via tempo's -config.expand-env=true flag). The EC2 instance role grants
# read/write access to the bucket — no explicit credentials needed.
#
# Receives traces from the OTel Collector via OTLP gRPC on :4317 (internal).
# Serves Grafana queries on :3200.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h  # 14 days

storage:
  trace:
    backend: s3
    s3:
      bucket: ${TEMPO_S3_BUCKET}
      region: ${AWS_DEFAULT_REGION}
      # IAM role credentials from EC2 instance profile — no keys needed.
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
