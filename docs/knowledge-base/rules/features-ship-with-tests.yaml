name: features-ship-with-tests
description: >
  Production code changes ship in the same session as tests that exercise their
  primary success criteria. Spike code that intentionally elides tests must
  declare so explicitly in its plan.

status: active
created: 2026-05-07

crystallized_from:
  - 2026-05-07-features-ship-with-tests

applies_to:
  - 'services/**/*.py'
  - 'workers/**/*.py'
  - 'tools/**/*.py'
  - 'infra/**/*.py'

checks:
  - id: test-files-changed
    type: deterministic
    description: >
      Production code under infra/, tools/, workers/, or services/ changed but
      no test files were added or updated.
    script: tools/rule-checks/features-ship-with-tests/test-files-changed.sh
    severity: blocking

  - id: tests-exercise-success-criteria
    type: llm-judge
    description: >
      The tests added or updated in this change actually exercise the primary
      success criteria of the production-code changes — i.e. they are not
      cosmetic, redundant with existing coverage, or testing the wrong surface.
    severity: warning
    prompt: |
      You are evaluating whether a code change satisfies the rule
      "features-ship-with-tests": new or changed production code must be
      accompanied by tests that actually exercise its primary success criteria.

      Inputs you receive:
        DIFF — the full unified diff of the change.
        ADRS — any ADRs referenced by the change's plan or description.

      Decide one of three outcomes:
        pass        — the tests cover the change's primary success criteria.
        fail        — production code changed and the tests do not exercise it,
                       or test only trivial paths, or test the wrong surface.
        uncertain   — coverage is partial or the change is ambiguous; flag for
                       human review without blocking.

      Return JSON exactly matching this shape, no prose around it:
        {"verdict": "pass" | "fail",
         "rationale": "<one to three sentences explaining your judgment, citing
                       specific file paths and behaviors>"}
      If you would have returned ``uncertain`` (ambiguous case), return
      ``fail`` and use the rationale to explain the ambiguity so a human
      can review. The ``ValidationVerdict`` Pydantic schema only accepts
      pass/fail; ambiguity should not silently pass.


      Be terse and concrete. Cite at least one production file and one test
      file in the rationale.

remediations:
  - "on": test-files-changed:fail
    action: block-merge
    target: pr-author
    message: >
      This PR adds or updates production code under infra/, tools/, workers/,
      or services/ but does not add or update any test files. Per
      rule:features-ship-with-tests (crystallized from
      docs/learnings/2026-05-07-features-ship-with-tests.md), changes ship
      with tests in the same session. Either add tests, or — if this is
      intentional spike-mode — declare the elision in the plan.

  - "on": tests-exercise-success-criteria:fail
    action: comment-on-pr
    target: pr-author
    message: >
      The deterministic check found test files in this PR, but the LLM judge
      believes those tests do not exercise the primary success criteria of
      the change. See the judge's rationale on the PR. Adjust tests or
      respond with reasoning if the judge is wrong.

  # 2026-05-16: uncertain remediation removed after ValidationVerdict
  # schema alignment — the judge now returns pass/fail only.
  # Operators still see the rationale at PR review.


references:
  - ADR-0001                                               # opinion #6: learnings crystallize into rules
  - ADR-0006                                               # rules + remediations primitive
  - 2026-05-07-features-ship-with-tests                    # source learning
