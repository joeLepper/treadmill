name: deterministic-gates-must-use-sandbox-safe-tools
description: >
  Deterministic validation gates in plan tasks may only invoke tools available
  in the worker sandbox. Forbidden commands (cdk synth against live AWS, aws CLI
  calls, docker run/compose, network egress, uninstalled tooling) produce
  Script-exited-1 failures the architect cannot diagnose, turning the
  wf-feedback loop into a deadlock that burns the 5-amend cap before escalating.
  Observed: 5 RAMJAC tasks wedged 2026-05-27 on a missing `aws_cdk` Python
  package — the architect verdicted `amend` 5× on logically-correct code
  because the gate was tooling-dead.

status: active
created: 2026-06-02

crystallized_from:
  - 2026-05-27-deterministic-gates-must-run-in-worker-sandbox

applies_to:
  - 'docs/plans/**/*.md'

checks:
  - id: deterministic-gate-sandbox-safe
    type: llm-judge
    description: >
      Each deterministic validation script described in a plan document must
      only call tools available in the worker sandbox. Banned: cdk synth against
      a live account, any `aws ...` command, `docker run`, `docker compose`,
      commands requiring network egress, or tooling not installed in the agent
      image. Allowed: pytest, make unit_test, make lint, grep, find, and any
      command that only reads the repo and writes nothing external.
    severity: blocking
    prompt: |
      You are evaluating whether a plan document conforms to the rule
      "deterministic-gates-must-use-sandbox-safe-tools": every deterministic
      validation script in a plan may only invoke tools available in the worker
      sandbox.

      The worker sandbox is a hermetic container. It has: Python + pip extras
      (installed at agent-image build time or via per-repo WorkerDeps per
      ADR-0059), make, cdk CLI binary, the project test runner (pytest/jest),
      grep, find, and standard POSIX shell tools. It has NO live AWS credentials,
      NO Docker daemon, and NO outbound network egress beyond the registries used
      during dep materialization.

      BANNED commands in deterministic gates:
        - `cdk synth` (unless run in an offline/mock-account mode that is
          explicitly documented as sandbox-safe in the plan)
        - Any `aws ...` CLI call that requires live credentials or a live endpoint
        - `docker run` / `docker compose` / `docker build`
        - Commands requiring outbound network egress at task runtime
          (pip install, curl, wget, npm install in the gate script body)
        - Tooling not in the agent image and not registered via ADR-0059 WorkerDeps

      SAFE commands in deterministic gates:
        - `pytest <path>` or `python -m pytest ...`
        - `make unit_test`, `make lint`, `make test` (when the makefile target
          is itself sandbox-safe — does not shell out to banned commands)
        - `grep`, `find`, `awk`, `sed` operating on repo files
        - Shell commands that read `repo/` and write nothing external

      Inputs you receive:
        PLAN_CONTENT — the full content of the plan document being reviewed.

      Focus on the validation section(s) of the plan: steps labeled "kind:
      deterministic", "type: deterministic", or validation scripts listed under
      task definitions. Ignore llm-judge checks, post-merge soak tasks, and any
      block explicitly labeled as non-deterministic — those are the correct
      escalation path for checks that need live infrastructure.

      Decide one of two outcomes:
        pass — all deterministic validation scripts in the plan only invoke
               sandbox-safe tools, OR the plan contains no deterministic
               validation scripts at all.
        fail — at least one deterministic validation script invokes a banned
               tool (cdk synth, aws CLI, docker, network egress, missing binary).

      Return JSON exactly matching this shape, no prose around it:
        {"verdict": "pass" | "fail",
         "rationale": "<one to two sentences citing the specific command that
                       raised concern and why it is banned, or confirming that
                       no banned commands were found>"}
      If uncertain (e.g. a makefile target whose body is not visible in the
      plan), return "fail" and explain the ambiguity in rationale so a human
      can review.

      Be terse and concrete. Quote the specific command that raised concern, or
      confirm that no deterministic scripts were found or all are sandbox-safe.

remediations:
  - "on": deterministic-gate-sandbox-safe:fail
    action: block-merge
    target: pr-author
    message: >
      This plan includes a deterministic validation script that calls a tool
      banned from the worker sandbox. Per
      rule:deterministic-gates-must-use-sandbox-safe-tools (crystallized from
      docs/learnings/2026-05-27-deterministic-gates-must-run-in-worker-sandbox.md),
      deterministic gates may not invoke `cdk synth` against a live account,
      `aws` CLI commands, `docker run`/`docker compose`, or anything requiring
      network egress or uninstalled tooling.

      Why this matters: the gate exits 1 for tooling reasons, not code reasons.
      The architect verdicts `amend` each cycle because it cannot distinguish
      tooling failure from code defect. The loop burns all 5 amend attempts
      (ADR-0029 cap) before escalating to the operator — wasted dispatch budget
      on logically-correct code. The 2026-05-27 RAMJAC incident lost 5 tasks to
      this pattern on a single day.

      Fix: replace the banned command with a pure `pytest` invocation, a
      sandbox-safe `make unit_test`/`make lint` call, or move the
      live-infrastructure check to an `llm-judge` block or a post-merge soak
      task. If the dependency is genuinely needed but absent from the agent
      image, register it via the ADR-0059 WorkerDeps path instead of embedding
      the install step in the gate script.

references:
  - ADR-0006   # rules + remediations primitive
  - ADR-0029   # ralph-loop: the 5-amend cap this deadlock burns
  - ADR-0038   # ralph-loop deadlock arbitration
  - ADR-0058   # gate-broken verdict (structural escape valve for when this slips through)
  - ADR-0059   # per-repo worker-dep registration (correct path for missing deps)
  - 2026-05-27-deterministic-gates-must-run-in-worker-sandbox   # source learning
