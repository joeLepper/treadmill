name: agent-md-locations
description: >
  Declares the directories where AGENT.md files must be present in this repository.
  This is a per-repo configuration rule; other Treadmill-managed projects define
  their own locations via this same rule.

status: active
created: 2026-05-14

crystallized_from:
  - ADR-0030  # federated in-repo agent context surfaces this rule

references:
  - ADR-0030  # federated in-repo agent context (mermaid + AGENT.md)

payload:
  locations:
    - services/api
    - workers/agent
    - infra
    - tools/local-adapter
    - tools/dev-hooks
    - docs

checks:
  - id: configured-locations-have-agent-md
    type: deterministic
    description: >
      For each location declared in payload.locations, verify that
      <location>/AGENT.md exists in the repo. Catches drift between
      the configured location set and the on-disk reality.
    script: tools/rule-checks/agent-md-locations/check.sh
    severity: blocking

remediations:
  - "on": configured-locations-have-agent-md:fail
    action: block-merge
    target: pr-author
    message: >
      One or more locations declared in agent-md-locations.yaml lack
      an AGENT.md file. Either author the missing file (see
      docs/agent-md-schema.md) or remove the location from the
      payload if the component no longer warrants federated context.
