name: workflow-step-view-checks-decision
description: >
  Any SQL VIEW or projection that summarizes lifecycle state from
  workflow_run_steps must consult both the structural status field and the
  semantic output->>'decision' field. A step with status='completed' and
  output->>'decision'='fail' is a failed workflow, not a finished one —
  reading only status will silently misclassify it as done.

status: active
created: 2026-05-17

crystallized_from:
  - 2026-05-15-silent-wf-author-failures-hidden-by-view-clause-6d

applies_to:
  - 'services/**/*.py'
  - 'services/**/alembic/**/*.py'

checks:
  - id: view-checks-both-status-and-decision
    type: deterministic
    description: >
      SQL VIEW definitions that reference workflow_run_steps.status must also
      reference output->>'decision' (or carry an explicit exemption comment
      "# rule:workflow-step-view-checks-decision: exempt") to avoid silently
      treating failed workflows as complete.
    script: tools/rule-checks/workflow-step-view-checks-decision/check.sh
    severity: blocking

remediations:
  - "on": view-checks-both-status-and-decision:fail
    action: block-merge
    target: pr-author
    message: >
      This PR adds or modifies a SQL VIEW or alembic migration that reads
      workflow_run_steps.status without also reading output->>'decision'. Per
      rule:workflow-step-view-checks-decision (crystallized from
      docs/learnings/2026-05-15-silent-wf-author-failures-hidden-by-view-clause-6d.md),
      views summarizing lifecycle state must consult both fields: a row with
      status='completed' and decision='fail' is a failed workflow, not a
      finished one. Add a check on output->>'decision' or add an exemption
      comment explaining why this view is exempt.

references:
  - ADR-0001   # opinion #6: learnings crystallize into rules
  - ADR-0006   # rules + remediations primitive
  - ADR-0011   # event-driven immutable runtime (StepOutput envelope)
  - ADR-0012   # uniform step-output envelope schema
  - 2026-05-15-silent-wf-author-failures-hidden-by-view-clause-6d   # source learning
