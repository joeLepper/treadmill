name: CI

# Runs the Treadmill test suite on every PR and on push to main.
# Per ADR-0031 §Prerequisites + task #127, this is the gate that
# auto-merge layers on top of — task-intent validation (wf-validate)
# is necessary but not sufficient; existing-test-suite still has to
# pass before mergeability flips to mergeable.
#
# The matrix is an allowlist, not auto-discovery: a component suite runs
# in CI only if it has a row below (the cli suite sat outside CI until
# task 97a10402 — green PRs were merging over red cli tests; the same
# sweep then added every other test directory in the repo, per
# orchestrator ruling). When adding a component with a test suite, add
# its row here — pytest suites join the matrix; non-pytest runners get a
# sibling job (see channel-server-bun). As of task 97a10402 every test
# directory in the repo is covered.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: services/api
          - component: workers/agent
          - component: tools/local-adapter
          - component: infra
          # cli imports treadmill_api (plan_validate, adr_api_coverage,
          # tokens) — resolved by the workspace sync below, which installs
          # services/api into the shared env; no PYTHONPATH needed. This
          # mirrors how the suite passes locally (task 97a10402).
          - component: cli
          - component: services/egress-proxy
          # Not itself a uv project: `uv run` from this dir resolves the
          # workspace root env (the infra row runs infra/tests only, so
          # the lambda suite needs its own row).
          - component: infra/lambdas/webhook_receiver
          # The tools/* dirs below are NOT workspace members; `uv run`
          # from each resolves the workspace root env, whose
          # --all-packages sync carries pytest. Stdlib-only suites —
          # verified to pass exactly this way (task 97a10402).
          - component: tools/cc-channels
          - component: tools/coordinator
          - component: tools/dev-hooks
          - component: tools/team-templates

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace deps
        run: uv sync --frozen --all-packages

      - name: Run ${{ matrix.component }} tests
        working-directory: ${{ matrix.component }}
        run: uv run pytest tests/ -q

      # Colliding migration revisions from parallel PRs produce multiple
      # alembic heads, which silently breaks `alembic upgrade head`. Gate it.
      - name: Alembic single-head check
        if: matrix.component == 'services/api'
        working-directory: services/api
        run: |
          heads=$(uv run alembic heads | grep -c '(head)')
          echo "alembic heads: $heads"
          if [ "$heads" != "1" ]; then
            echo "::error::expected exactly one alembic head, found $heads (colliding migrations — rebase + chain)"
            uv run alembic heads
            exit 1
          fi

      # Pure-files chain linter (post-mortem surprise C from the
      # ADR-0085+0086 plan): catches multi-head + duplicate-revision +
      # dangling-down-revision via regex over the migration files. No
      # alembic install needed; runs as a sibling to the live
      # ``alembic heads`` check above so a missing dep on either side
      # doesn't silently let a chain bug through. Recognises alembic
      # merge-migration tuple shapes (false-positive class fixed in
      # PR #281). The same tool is the pre-commit and worker-sandbox
      # primitive — keeping CI on the same command means a green PR
      # locally is a green PR in CI.
      - name: Migration-chain linter (pure-files)
        if: matrix.component == 'services/api'
        run: |
          uv run --project cli python -m treadmill_cli.cli \
            plan check-migration-chain \
            --versions-dir services/api/alembic/versions

  # The treadmill-events channel server is Bun/TypeScript — outside the
  # uv matrix above. `bun test` exits 1 when it finds no test files, so
  # this job is itself guarded against the never-executes class: deleting
  # the last test file turns it red rather than silently green.
  channel-server-bun:
    name: tools/cc-channel-treadmill (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        working-directory: tools/cc-channel-treadmill
        run: bun install --frozen-lockfile

      - name: Run bun tests
        working-directory: tools/cc-channel-treadmill
        run: bun test

  # The pytest job runs in the uv workspace, whose env carries transitive deps
  # a component may import without declaring. The container image installs only
  # the component's *direct* deps (`pip install .`), so a missing declaration
  # passes CI yet crashes the container. Build the image and import the app to
  # close that gap. See docs/learnings/2026-05-20-ci-workspace-env-masks-
  # missing-container-deps.md (the cryptography incident).
  api-image-smoke:
    name: services/api image smoke-import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t treadmill-api:ci services/api

      - name: Smoke-import the app in the built image
        run: docker run --rm treadmill-api:ci python -c "import treadmill_api.app; print('app import ok')"

  # services/dashboard is React/TS (Vite + Vitest) — outside the uv matrix.
  # It had NO CI job, which is exactly why a tsc build break (#348's
  # architect/validator-gold prop-type errors) AND 16 review-UI test failures
  # landed unseen: nothing ran `npm run build` or `npm test` on a PR. This job
  # closes the build half — `npm run build` (tsc -b + vite build) is the gate
  # that would have caught the break. The vitest suite is a tracked follow-up:
  # 16 pre-existing review/ + PageLayout failures (ADR-0061 triage UI) must be
  # fixed or quarantined first, then `npm test` joins this job as a gate.
  dashboard:
    name: services/dashboard (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/dashboard/package-lock.json

      - name: Install deps
        working-directory: services/dashboard
        run: npm ci

      - name: Build (tsc -b + vite)
        working-directory: services/dashboard
        run: npm run build
