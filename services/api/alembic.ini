; Alembic config for the Treadmill API.
;
; The database URL is NOT set here — env.py resolves it from
; treadmill_api.config.Settings at runtime so dev / staging / prod read
; the same code path. Migrations run synchronously (psycopg) even though
; the API uses asyncpg.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is intentionally absent; env.py constructs it.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
