server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Static asset caching — fingerprinted by Vite, immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every non-asset path serves index.html so React Router
    # owns routing. The Treadmill API is served separately at :8088; the
    # dashboard talks to it via the operator's host (CORS allowed in dev).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
