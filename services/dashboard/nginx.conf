map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Static asset caching — fingerprinted by Vite, immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse-proxy the Treadmill API + WebSocket to the api container
    # by its docker-network DNS name. The dashboard's `queries.ts` calls
    # relative `/api/v1/...` paths and `sim.ts` opens a WS at
    # `/api/v1/dashboard/ws/events`; without these blocks the SPA
    # fallback below catches every `/api/...` request and returns
    # `index.html`, breaking `await res.json()` in the queryFn bodies
    # (caught 2026-05-27: Overview wouldn't load because the fetch
    # response was HTML, not JSON).
    location /api/ {
        proxy_pass http://treadmill-api:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Carry WebSocket Upgrade headers so the dashboard's
        # `/api/v1/dashboard/ws/events` subscription (ADR-0056 PR-B11)
        # rides the same prefix. The `map $http_upgrade` block at the
        # top of this file emits the right `Connection` value
        # (`upgrade` when the client asked, `close` otherwise) so plain
        # HTTP requests on /api/ don't pay any WS-related cost.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WS connections expect to stay open. 24h matches the API's
        # heartbeat-driven liveness signal; if the upstream goes away
        # the API closes its end and the client reconnects with backoff
        # (sim.ts).
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — every non-asset, non-/api path serves index.html so
    # React Router owns client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
